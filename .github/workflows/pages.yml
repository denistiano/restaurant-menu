# Build static site (generate /{restaurantId}/ routes) then deploy to GitHub Pages.
# Requires: Settings → Pages → Source = GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: ['main', 'master']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # If resources/seo-config.json has empty base_url, use default GitHub Pages project URL
      # (https://<owner>.github.io/<repo>/). Override base_url in the file for a custom domain.
      - name: Default SEO base URL for GitHub Pages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 <<'PY'
          import json, os
          repo = os.environ["GITHUB_REPOSITORY"]
          owner, name = repo.split("/", 1)
          base = f"https://{owner}.github.io/{name}"
          path = "resources/seo-config.json"
          with open(path, encoding="utf-8") as f:
              cfg = json.load(f)
          if not (cfg.get("base_url") or "").strip():
              cfg["base_url"] = base
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(cfg, f, indent=2, ensure_ascii=False)
                  f.write("\n")
              print("Set seo-config base_url to", base)
          else:
              print("Keeping committed base_url:", cfg.get("base_url"))
          PY

      # generate_pages.py: /<id>/index.html from resources/restaurants.json + sitemap.xml + robots.txt (URLs from seo-config base_url).
      - name: Generate restaurant pages and sitemap (from restaurants.json)
        run: bash scripts/generate-restaurant-pages.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
