<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Reserve a table</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="apple-touch-icon" href="../favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <!-- API origin — overridden by window.__MENU_API_BASE__ or meta tag -->
  <meta name="menu-api-base" content="https://tebeshir.online" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#080810" />
</head>
<body data-theme="modern">
  <div class="rv-page" id="rvPage">

    <!-- HEADER -->
    <header class="rv-header" id="rvHeader">
      <a href="../" class="rv-header__back" id="rvBack" title="Back to menu" aria-label="Back to menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div class="rv-header__info">
        <div class="rv-header__name" id="rvRestaurantName">Loading…</div>
        <div class="rv-header__sub" id="rvRestaurantSub">Table reservation</div>
      </div>
    </header>

    <!-- DATE / TIME BAR -->
    <div class="rv-date-bar" id="rvDateBar">
      <label for="rvDateInput">Date</label>
      <input type="date" id="rvDateInput" />
      <label for="rvTimeInput" style="margin-left:8px">Time</label>
      <input type="time" id="rvTimeInput" />
      <span class="rv-duration-wrap" id="rvDurationHost" style="display:none" aria-hidden="true"></span>
    </div>
    <p class="rv-forfeit-hint" id="rvForfeitHint" style="display:none" aria-live="polite"></p>

    <!-- BODY -->
    <div class="rv-body" id="rvBody">
      <div class="rv-loading" id="rvLoading">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10" stroke-opacity=".3"/>
          <path d="M12 2a10 10 0 0 1 10 10" stroke-dasharray="32" stroke-dashoffset="0">
            <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur=".8s" repeatCount="indefinite"/>
          </path>
        </svg>
        <span>Loading floor plan…</span>
      </div>
    </div>

  </div><!-- /rv-page -->

  <!-- BOOKING SHEET (injected by JS) -->

  <script src="../js/layout-bounds.js"></script>
  <script src="../js/reserve.js"></script>
</body>
</html>
