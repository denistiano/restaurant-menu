<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operations</title>
  <link rel="stylesheet" href="admin.css" />
  <meta name="menu-api-base" content="https://tebeshir.online" />
  <style>
    .su-wrap { max-width: 920px; margin: 0 auto; padding: 24px 16px 80px; }
    .su-h1 { font-family: var(--font-serif); font-size: 1.35rem; margin-bottom: 8px; }
    .su-muted { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .su-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); margin-top: 16px; }
    table.su-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .su-table th, .su-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .su-table th { color: var(--muted); font-weight: 500; }
    .su-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .su-btn { padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface-2); font-size: 13px; }
    .su-btn--primary { background: var(--accent-dim); border-color: rgba(196,149,90,0.35); color: var(--text); }
    .su-btn--danger { border-color: rgba(224,92,92,0.35); color: var(--danger); }
    .su-field { margin-bottom: 12px; }
    .su-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .su-field input, .su-field textarea { width: 100%; max-width: 480px; padding: 10px 12px; }
    .su-field textarea { min-height: 72px; font-family: ui-monospace, monospace; font-size: 12px; }
    .su-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-top: 24px; }
    .su-back { display: inline-block; margin-bottom: 20px; font-size: 13px; color: var(--muted); }
    .su-back:hover { color: var(--accent); }
    .su-err { color: var(--danger); font-size: 13px; margin-top: 8px; }
    .su-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="su-wrap">
    <a class="su-back" href="index.html">← Back</a>

    <div id="suLogin">
      <h1 class="su-h1">Operations</h1>
      <p class="su-muted">Super administrator sign-in. User management only — bookmark this URL; it is not linked from public pages.</p>
      <div class="su-field">
        <label for="suUser">Username</label>
        <input id="suUser" type="text" autocomplete="username" />
      </div>
      <div class="su-field">
        <label for="suPass">Password</label>
        <input id="suPass" type="password" autocomplete="current-password" />
      </div>
      <button type="button" class="su-btn su-btn--primary" id="suLoginBtn">Sign in</button>
      <p class="su-err su-hidden" id="suLoginErr"></p>
    </div>

    <div id="suMain" class="su-hidden">
      <h1 class="su-h1">Users</h1>
      <p class="su-muted">Create and edit API accounts. Assign venues as <code>restaurantId:ADMIN</code> or <code>restaurantId:EDITOR</code> (one per line).</p>
      <button type="button" class="su-btn" id="suRefreshBtn">Refresh list</button>
      <button type="button" class="su-btn su-btn--danger" id="suLogoutBtn">Sign out</button>

      <div class="su-table-wrap">
        <table class="su-table" id="suTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Enabled</th>
              <th>Super</th>
              <th>Venues</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="suTbody"></tbody>
        </table>
      </div>

      <div class="su-card">
        <h2 class="su-h1" style="font-size:1.1rem">New user</h2>
        <div class="su-field">
          <label for="suNewUser">Username</label>
          <input id="suNewUser" type="text" />
        </div>
        <div class="su-field">
          <label for="suNewPass">Password (min 8)</label>
          <input id="suNewPass" type="password" />
        </div>
        <div class="su-field">
          <label><input type="checkbox" id="suNewEn" checked /> Enabled</label>
        </div>
        <div class="su-field">
          <label><input type="checkbox" id="suNewSuper" /> Super administrator</label>
        </div>
        <div class="su-field">
          <label for="suNewAssign">Venue assignments</label>
          <textarea id="suNewAssign" placeholder="retur:ADMIN"></textarea>
        </div>
        <button type="button" class="su-btn su-btn--primary" id="suCreateBtn">Create</button>
        <p class="su-err su-hidden" id="suCreateErr"></p>
      </div>
    </div>
  </div>
  <script src="su-n3k8.js"></script>
</body>
</html>
