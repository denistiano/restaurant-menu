<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Add user · Staff</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="stylesheet" href="admin.css" />
  <meta name="menu-api-base" content="https://tebeshir.online" />
  <style>
    .su-wrap { max-width: 920px; margin: 0 auto; padding: 24px 16px 80px; }
    .su-h1 { font-family: var(--font-serif); font-size: 1.35rem; margin-bottom: 8px; }
    .su-muted { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .su-field { margin-bottom: 12px; }
    .su-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .su-field input, .su-field textarea { width: 100%; max-width: 480px; padding: 10px 12px; }
    .su-field textarea { min-height: 72px; font-family: ui-monospace, monospace; font-size: 12px; }
    .su-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-top: 24px; }
    .su-back { display: inline-block; margin-bottom: 20px; font-size: 13px; color: var(--muted); }
    .su-back:hover { color: var(--accent); }
    .su-err { color: var(--danger); font-size: 13px; margin-top: 8px; }
    .su-hidden { display: none !important; }
    .su-btn { padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface-2); font-size: 13px; }
    .su-btn--primary { background: var(--accent-dim); border-color: rgba(196,149,90,0.35); color: var(--text); }
    .su-btn--danger { border-color: rgba(224,92,92,0.35); color: var(--danger); }
    .su-toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 8px; }
    .su-venue-search {
      width: 100%; max-width: 100%; padding: 10px 12px; margin-bottom: 10px;
      border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-2); font-size: 13px;
    }
    .su-venue-chosen { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; min-height: 0; }
    .su-venue-chip {
      display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 6px 10px; border-radius: var(--radius-pill); border: 1px solid var(--border);
      background: var(--accent-dim); font-size: 12px; max-width: 100%;
    }
    .su-venue-chip select { font-size: 12px; padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); }
    .su-venue-chip__remove {
      border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px;
    }
    .su-venue-chip__remove:hover { color: var(--danger); }
    .su-venue-pick {
      max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface-2);
    }
    .su-venue-row {
      display: block; width: 100%; text-align: left; padding: 10px 12px; border: none; border-bottom: 1px solid var(--border);
      background: transparent; font-size: 13px; cursor: pointer; color: var(--text);
    }
    .su-venue-row:last-child { border-bottom: none; }
    .su-venue-row:hover { background: var(--surface); }
    .su-venue-row__id { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }
    .su-venue-empty { padding: 12px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body class="has-m-app-nav">
  <div class="su-wrap">
    <a class="su-back su-back--logo" href="index.html" aria-label="Back to admin" title="Back">
      <img src="../resources/logo.webp" alt="" class="su-back__logo" width="40" height="40" decoding="async" />
    </a>

    <div id="suLogin">
      <h1 class="su-h1">Add user</h1>
      <p class="su-muted">Sign in with a full administrator account. You can add people here and manage existing accounts under <strong>Users</strong>.</p>
      <div class="su-field">
        <label for="suUser">Username</label>
        <input id="suUser" type="text" autocomplete="username" />
      </div>
      <div class="su-field">
        <label for="suPass">Password</label>
        <input id="suPass" type="password" autocomplete="current-password" />
      </div>
      <button type="button" class="su-btn su-btn--primary" id="suLoginBtn">Sign in</button>
      <p class="su-err su-hidden" id="suLoginErr"></p>
      <button type="button" class="su-btn su-hidden" id="suRetryVerifyBtn" style="margin-top:10px">Try again</button>
    </div>

    <div id="suMain" class="su-hidden">
      <h1 class="su-h1">Add user</h1>
      <p class="su-muted">Create a sign-in for staff and choose which venues they can open. Change or remove users anytime under <strong>Users</strong>.</p>
      <div class="su-toolbar">
        <button type="button" class="su-btn su-btn--danger" id="suLogoutBtn">Sign out</button>
      </div>

      <div class="su-card">
        <h2 class="su-h1" style="font-size:1.1rem">New account</h2>
        <div class="su-field">
          <label for="suNewUser">Username</label>
          <input id="suNewUser" type="text" />
        </div>
        <div class="su-field">
          <label for="suNewPass">Password (optional, at least 8 characters)</label>
          <input id="suNewPass" type="password" placeholder="Leave blank to send a setup link instead" />
        </div>
        <div class="su-field">
          <label><input type="checkbox" id="suNewEn" checked /> Account active</label>
        </div>
        <div class="su-field">
          <label><input type="checkbox" id="suNewSuper" /> Full administrator</label>
        </div>
        <div class="su-field">
          <label for="suNewVenueSearch">Venue access</label>
          <input type="search" id="suNewVenueSearch" class="su-venue-search" placeholder="Search by name or venue id…" autocomplete="off" />
          <div id="suNewVenueChosen" class="su-venue-chosen" aria-live="polite"></div>
          <div id="suNewVenuePick" class="su-venue-pick"></div>
        </div>
        <button type="button" class="su-btn su-btn--primary" id="suCreateBtn">Create</button>
        <p class="su-err su-hidden" id="suCreateErr"></p>
      </div>
    </div>
  </div>
  <nav class="m-app-nav" aria-label="Staff tools">
    <a class="m-app-nav__link m-app-nav__link--hub" href="index.html" title="Venue / menu editor" aria-label="Venue — open menu editor">
      <img src="../resources/logo.webp" alt="" class="m-app-nav__hub-logo" width="28" height="28" decoding="async" />
      <span class="m-app-nav__label">Venue</span>
    </a>
    <a class="m-app-nav__link" href="su-n3k8.html">
      <svg class="m-app-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="m-app-nav__label">Users</span>
    </a>
    <a class="m-app-nav__link m-app-nav__link--active" href="new-user.html" aria-current="page">
      <svg class="m-app-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      <span class="m-app-nav__label">New user</span>
    </a>
    <a class="m-app-nav__link" href="logs.html">
      <svg class="m-app-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-6"/></svg>
      <span class="m-app-nav__label">Activity</span>
    </a>
  </nav>
  <script src="su-n3k8.js"></script>
</body>
</html>
