<!DOCTYPE html>
<html class="m-staff-root" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Add user · Staff</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="stylesheet" href="admin.css" />
  <meta name="menu-api-base" content="https://tebeshir.online" />
  <style>
    .nu-panel { width: 100%; max-width: 520px; margin: 0 auto; box-sizing: border-box; }
    .nu-top { padding: 8px 0 4px; }
    .nu-h1 { font-family: var(--font-serif); font-size: 1.4rem; margin: 0 0 6px; }
    .nu-lead { color: var(--muted); font-size: 14px; line-height: 1.5; margin: 0 0 16px; }
    .nu-field { margin-bottom: 16px; }
    .nu-field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.02em; }
    .nu-field input[type="text"],
    .nu-field input[type="password"],
    .nu-field input[type="search"] {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      font-size: 16px;
      border-radius: 12px;
      box-sizing: border-box;
    }
    .nu-check { display: flex; align-items: center; gap: 12px; min-height: 48px; padding: 4px 0; font-size: 15px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .nu-check input { width: 22px; height: 22px; flex-shrink: 0; accent-color: var(--accent); }
    .nu-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 16px 20px;
    }
    .nu-card h2 { font-family: var(--font-serif); font-size: 1.1rem; margin: 0 0 16px; font-weight: 600; }
    .nu-btn-primary {
      width: 100%;
      min-height: 50px;
      margin-top: 8px;
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid rgba(196, 149, 90, 0.45);
      background: var(--accent);
      color: #0a0a10;
      font: 600 16px var(--font-sans, system-ui, sans-serif);
      -webkit-tap-highlight-color: transparent;
    }
    .nu-btn-primary:hover { filter: brightness(1.05); }
    .nu-err { color: var(--danger); font-size: 14px; margin-top: 10px; }
    .nu-hidden { display: none !important; }
    .nu-panel .su-venue-search {
      width: 100%; min-height: 48px; padding: 10px 14px; margin-bottom: 10px;
      border: 1px solid var(--border); border-radius: 12px; background: var(--surface-2); font-size: 16px;
    }
    .nu-panel .su-venue-chosen { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; min-height: 0; }
    .nu-panel .su-venue-chip {
      display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 8px 12px; border-radius: var(--radius-pill); border: 1px solid var(--border);
      background: var(--accent-dim); font-size: 13px; max-width: 100%;
    }
    .nu-panel .su-venue-chip select { font-size: 13px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); }
    .nu-panel .su-venue-chip__remove {
      border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px;
    }
    .nu-panel .su-venue-pick {
      max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface-2);
    }
    .nu-panel .su-venue-row {
      display: block; width: 100%; text-align: left; padding: 12px 14px; border: none; border-bottom: 1px solid var(--border);
      background: transparent; font-size: 15px; cursor: pointer; color: var(--text);
    }
    .nu-panel .su-venue-row:last-child { border-bottom: none; }
    .nu-panel .su-venue-row:active { background: var(--surface); }
    .nu-panel .su-venue-row__id { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }
    .nu-panel .su-venue-empty { padding: 12px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body class="has-m-app-nav m-staff-shell">
  <div class="m-staff-shell__main">
    <div class="m-staff-shell__scroll m-staff-form-scroll" style="padding: 12px 16px 0;">

    <div id="suLogin" class="nu-panel">
      <div class="nu-top">
        <a class="su-back su-back--logo" href="index.html" aria-label="Back to admin" title="Back">
          <img src="../resources/logo.webp" alt="" class="su-back__logo" width="40" height="40" decoding="async" />
        </a>
        <h1 class="nu-h1">Add user</h1>
        <p class="nu-lead">Sign in with a full administrator account. You can add people here; manage existing accounts under <strong>Users</strong>.</p>
      </div>
      <div class="nu-field">
        <label for="suUser">Username</label>
        <input id="suUser" type="text" autocomplete="username" />
      </div>
      <div class="nu-field">
        <label for="suPass">Password</label>
        <input id="suPass" type="password" autocomplete="current-password" />
      </div>
      <button type="button" class="nu-btn-primary" id="suLoginBtn">Sign in</button>
      <p class="nu-err su-hidden" id="suLoginErr"></p>
      <button type="button" class="nu-btn-primary su-hidden" id="suRetryVerifyBtn" style="margin-top:10px; background: var(--surface-2); color: var(--text); border-color: var(--border)">Try again</button>
    </div>

    <div id="suMain" class="nu-panel su-hidden">
      <div class="nu-top">
        <a class="su-back su-back--logo" href="index.html" aria-label="Back to admin" title="Back">
          <img src="../resources/logo.webp" alt="" class="su-back__logo" width="40" height="40" decoding="async" />
        </a>
        <h1 class="nu-h1">Add user</h1>
        <p class="nu-lead">Create a sign-in and pick which venues they can open.</p>
      </div>

      <div class="nu-card">
        <h2>New account</h2>
        <div class="nu-field">
          <label for="suNewUser">Username</label>
          <input id="suNewUser" type="text" autocomplete="off" />
        </div>
        <div class="nu-field">
          <label for="suNewPass">Password (optional)</label>
          <input id="suNewPass" type="password" placeholder="At least 8 characters, or leave blank for a setup link" />
        </div>
        <label class="nu-check">
          <input type="checkbox" id="suNewEn" checked />
          <span>Account active</span>
        </label>
        <label class="nu-check">
          <input type="checkbox" id="suNewSuper" />
          <span>Full administrator</span>
        </label>
        <div class="nu-field" style="margin-top: 8px">
          <label for="suNewVenueSearch">Venue access</label>
          <input type="search" id="suNewVenueSearch" class="su-venue-search" placeholder="Search by name or venue id…" autocomplete="off" />
          <div id="suNewVenueChosen" class="su-venue-chosen" aria-live="polite"></div>
          <div id="suNewVenuePick" class="su-venue-pick"></div>
        </div>
        <button type="button" class="nu-btn-primary" id="suCreateBtn">Create user</button>
        <p class="nu-err su-hidden" id="suCreateErr"></p>
      </div>
    </div>
    </div>
  </div>
  <nav class="m-app-nav" aria-label="Staff tools">
    <a class="m-app-nav__link m-app-nav__link--hub" href="index.html" title="Venue / menu editor" aria-label="Venue — open menu editor">
      <img src="../resources/logo.webp" alt="" class="m-app-nav__hub-logo" width="28" height="28" decoding="async" />
      <span class="m-app-nav__label">Venue</span>
    </a>
    <a class="m-app-nav__link" href="su-n3k8.html">
      <svg class="m-app-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="m-app-nav__label">Users</span>
    </a>
    <a class="m-app-nav__link m-app-nav__link--active" href="new-user.html" aria-current="page">
      <svg class="m-app-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      <span class="m-app-nav__label">New user</span>
    </a>
    <a class="m-app-nav__link" href="logs.html">
      <svg class="m-app-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-6"/></svg>
      <span class="m-app-nav__label">Activity</span>
    </a>
  </nav>
  <script src="su-n3k8.js"></script>
</body>
</html>
