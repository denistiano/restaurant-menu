<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Set password</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="stylesheet" href="admin.css" />
  <meta name="menu-api-base" content="https://tebeshir.online" />
  <style>
    .sp-wrap { max-width: 420px; margin: 0 auto; padding: 32px 16px 80px; }
    .sp-h1 { font-family: var(--font-serif); font-size: 1.35rem; margin-bottom: 8px; }
    .sp-muted { color: var(--muted); font-size: 13px; margin-bottom: 20px; line-height: 1.5; }
    .sp-field { margin-bottom: 14px; }
    .sp-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .sp-field input { width: 100%; padding: 10px 12px; }
    .sp-btn {
      width: 100%; margin-top: 8px; padding: 12px; border-radius: var(--radius-sm);
      border: 1px solid rgba(196,149,90,0.35); background: var(--accent-dim); color: var(--text);
      font-size: 14px; cursor: pointer;
    }
    .sp-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .sp-err { color: var(--danger); font-size: 13px; margin-top: 10px; }
    .sp-ok { color: var(--success); font-size: 14px; margin-top: 16px; }
    .sp-hidden { display: none !important; }
  </style>
</head>
<body class="has-m-app-nav">
  <div class="sp-wrap">
    <h1 class="sp-h1">Set your password</h1>
    <p class="sp-muted" id="spHint">Use the link from your administrator. Choose a password at least 8 characters.</p>
    <p class="sp-err sp-hidden" id="spNoToken">Missing or invalid link. Ask for a new setup link from a super administrator.</p>
    <form id="spForm" class="sp-hidden">
      <div class="sp-field">
        <label for="spPass">New password</label>
        <input id="spPass" type="password" autocomplete="new-password" minlength="8" required />
      </div>
      <div class="sp-field">
        <label for="spPass2">Confirm password</label>
        <input id="spPass2" type="password" autocomplete="new-password" minlength="8" required />
      </div>
      <button type="submit" class="sp-btn" id="spSubmit">Save password</button>
      <p class="sp-err sp-hidden" id="spErr"></p>
    </form>
    <p class="sp-ok sp-hidden" id="spOk">Password saved. You can close this page and sign in at the staff panel.</p>
    <p class="sp-muted" style="margin-top:24px"><a href="index.html" style="color:var(--muted)">← Staff sign-in</a></p>
  </div>
  <nav class="m-app-nav" aria-label="Staff tools">
    <a class="m-app-nav__link m-app-nav__link--hub" href="index.html" title="Venue / menu editor" aria-label="Venue — open menu editor">
      <img src="../resources/logo.webp" alt="" class="m-app-nav__hub-logo" width="28" height="28" decoding="async" />
      <span class="m-app-nav__label">Venue</span>
    </a>
    <a class="m-app-nav__link" href="su-n3k8.html">
      <svg class="m-app-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="m-app-nav__label">Users</span>
    </a>
    <a class="m-app-nav__link" href="new-user.html">
      <svg class="m-app-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      <span class="m-app-nav__label">New user</span>
    </a>
    <a class="m-app-nav__link" href="logs.html">
      <svg class="m-app-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-6"/></svg>
      <span class="m-app-nav__label">Activity</span>
    </a>
  </nav>
  <script src="set-password.js"></script>
</body>
</html>
