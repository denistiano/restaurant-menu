# ── Restaurant Settings ────────────────────────────────────

restaurant:
  id:               retur
  name_en:          Retur Food & Drinks
  name_bg:          Ретур Храна & Напитки
  tagline_en:       Home-cooked with love, served with care — just like home.
  tagline_bg:       Готвено с любов, поднесено с грижа — като у дома.
  default_language: bg          # bg = opens in Bulgarian | en = opens in English
  theme:            classic     # classic = text list     | modern = image cards
  image:            cover.jpg   # thumbnail on the landing page
  background:       cover.jpg   # blurred image behind the header
  logo:                         # round logo in the header — leave blank if none

# ── Tag Translations ───────────────────────────────────────

tags:
  homemade:    { en: Homemade,    bg: Домашно }
  vegetarian:  { en: Vegetarian,  bg: Вегетарианско }
  vegan:       { en: Vegan,       bg: Веган }
  cold:        { en: Cold,        bg: Студено }
  traditional: { en: Traditional, bg: Традиционно }
  pasta:       { en: Pasta,       bg: Паста }
  rice:        { en: Rice,        bg: Ориз }
  healthy:     { en: Healthy,     bg: Здравословно }
  classic:     { en: Classic,     bg: Класик }


